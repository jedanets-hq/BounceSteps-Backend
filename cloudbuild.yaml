# Google Cloud Build configuration for BounceSteps Backend with Admin Portal Fixes
steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'gcr.io/$PROJECT_ID/bouncesteps-backend:$BUILD_ID',
      '-t', 'gcr.io/$PROJECT_ID/bouncesteps-backend:latest',
      '.'
    ]
    id: 'build-image'

  # Push the Docker image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/bouncesteps-backend:$BUILD_ID']
    id: 'push-image'
    waitFor: ['build-image']

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args: [
      'run', 'deploy', 'bouncesteps-backend',
      '--image', 'gcr.io/$PROJECT_ID/bouncesteps-backend:$BUILD_ID',
      '--region', 'us-central1',
      '--allow-unauthenticated',
      '--port', '8080',
      '--memory', '1Gi',
      '--cpu', '1',
      '--timeout', '900',
      '--max-instances', '10',
      '--min-instances', '0',
      '--concurrency', '80',
      '--set-env-vars', 'NODE_ENV=production,PORT=8080',
      '--execution-environment', 'gen2'
    ]
    id: 'deploy-to-cloud-run'
    waitFor: ['push-image']

# Store images in Container Registry
images:
  - 'gcr.io/$PROJECT_ID/bouncesteps-backend:$BUILD_ID'
  - 'gcr.io/$PROJECT_ID/bouncesteps-backend:latest'

# Build options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

# Timeout for the entire build
timeout: '1200s'